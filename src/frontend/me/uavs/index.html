<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои БПЛА</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="./script.js" type="module"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-6xl">
        <h2 class="text-2xl font-bold mb-6 text-center">Мои БПЛА</h2>
        <table class="min-w-full bg-white border border-gray-300">
            <thead>
                <tr class="bg-gray-200">
                    <th class="py-2 px-4 border-b text-left">Модель БПЛА</th>
                    <th class="py-2 px-4 border-b text-left">Серийный номер</th>
                    <th class="py-2 px-4 border-b text-left">Шумовые характеристики (Гц)</th>
                    <th class="py-2 px-4 border-b text-left">Учетный номер</th>
                    <th id="th-created_at" class="py-2 px-4 border-b text-left">Дата добавления</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
        <div class="flex justify-left mt-6">
            <button
                id="add-uav"
                class="bg-blue-500 text-white py-2 px-4 rounded-md hover:bg-blue-600 transition duration-200"
            >
                Добавить новый БПЛА
            </button>
            <button
                id="back"
                class="bg-gray-500 ml-3 text-white py-2 px-4 rounded-md hover:bg-gray-600 transition duration-200"
            >
                Назад к профилю
            </button>
        </div>
    </div>
</body>
</html>
