<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавление БПЛА</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="./script.js" type="module"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
<div class="bg-white p-8 rounded-lg shadow-md w-96">
    <h2 class="text-2xl font-bold mb-6 text-center">Форма добавления БПЛА</h2>
    <div>
        <div class="mb-4">
            <label for="model" class="block text-sm font-medium text-gray-700">
                Модель
            </label>
            <input
                type="text"
                id="model"
                name="model"
                placeholder="Введите модель БПЛА"
                class="mt-1 block w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring focus:ring-blue-200"
                required
            >
        </div>
        <div class="mb-4">
            <label for="serial_number" class="block text-sm font-medium text-gray-700">
                Серийный номер
            </label>
            <input
                type="text"
                id="serial_number"
                name="serial_number"
                placeholder="Введите серийный номер БПЛА"
                class="mt-1 block w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring focus:ring-blue-200"
                required
            >
        </div>
        <div class="mb-4">
            <label for="reference_number" class="block text-sm font-medium text-gray-700">
                Учетный номер
            </label>
            <input
                type="number"
                id="reference_number"
                name="reference_number"
                min="1"
                max="20"
                placeholder="Введите учетный номер"
                class="mt-1 block w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring focus:ring-blue-200"
                required
            >
        </div>
        <div class="mb-4">
            <label for="noise_characteristics" class="block text-sm font-medium text-gray-700">
                Шумовая характеристика(Гц)
            </label>
            <input
                type="number"
                id="noise_characteristics"
                name="noise_characteristics"
                max="100"
                min="1"
                placeholder="Введите шумовую характеристику(Гц)"
                class="mt-1 block w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring focus:ring-blue-200"
                required
            >
        </div>
        <button
            type="button"
            id="add"
            class="w-full bg-blue-500 text-white py-2 rounded-md hover:bg-blue-600 transition duration-200"
        >
            Отправить
        </button>
        <button
            type="button"
            id="back"
            class="w-full mt-1 bg-gray-500 text-white py-2 rounded-md hover:bg-gray-600 transition duration-200"
        >
            Назад к БПЛА
        </button>
    </div>
</div>
</body>
</html>
