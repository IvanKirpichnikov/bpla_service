<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="./script.js" type="module"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
<div class="bg-white p-8 rounded-lg shadow-md w-96">
    <h2 class="text-2xl font-bold mb-6 text-center">Авторизация</h2>
    <div>
        <div class="mb-4">
            <label for="email" class="block text-sm font-medium text-gray-700">
                Почта
            </label>
            <input
                type="email"
                id="email"
                name="email"
                placeholder="Введите почту"
                class="mt-1 block w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring focus:ring-blue-200"
                required
            >
        </div>
        <div class="mb-4">
            <label for="password" class="block text-sm font-medium text-gray-700">
                Пароль
            </label>
            <input
                type="password"
                id="password"
                name="password"
                placeholder="Введите пароль"
                class="mt-1 block w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring focus:ring-blue-200"
                required
            >
        </div>
        <button
            type="button"
            id="auth"
            class="w-full bg-blue-500 text-white py-2 rounded-md hover:bg-blue-600 transition duration-200"
        >
            Авторизоваться
        </button>
        <button
            type="button"
            id="login"
            class="w-full bg-gray-500 mt-2 text-white py-2 rounded-md hover:bg-gray-600 transition duration-200"
        >
            Зарегистрироваться
        </button>
    </div>
</div>
</body>
</html>
